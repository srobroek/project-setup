schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "dirs-scaffold"
name = "Directory scaffold"
version = "1.0.1"  # x-release-please-version
description = "Create the standard directory structure with .gitkeep files. Supports single and monorepo layouts."
default_enabled = true
reconcile = true

[order]
requires = ["core-identity"]

[[inputs]]
key = "layout"
type = "choice"
prompt = "Project layout"
choices = ["single", "monorepo"]
default = "single"
required = false

[[inputs]]
key = "targets"
type = "list"
prompt = "Additional monorepo target directories (leave empty for defaults)"
required = false

[[steps]]
id = "write"
kind = "python"
