schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "license-write"
name = "LICENSE file"
version = "2.0.0"  # x-release-please-version
description = "Write a LICENSE file from one of the 13 SPDX licenses vendored from the GitHub Licenses API. Year and author are filled at runtime (SC-001 carve-out: these lines vary). Optionally fetches the latest body on demand (dynamic_fetch=true)."
default_enabled = true
reconcile = false

[order]
requires = ["core-identity"]

[[inputs]]
key = "license"
type = "choice"
prompt = "License"
choices = [
  "agpl-3.0",
  "apache-2.0",
  "bsd-2-clause",
  "bsd-3-clause",
  "bsl-1.0",
  "cc0-1.0",
  "epl-2.0",
  "gpl-2.0",
  "gpl-3.0",
  "lgpl-2.1",
  "mit",
  "mpl-2.0",
  "unlicense",
]
default = "apache-2.0"
required = false

[[inputs]]
key = "author"
type = "string"
prompt = "Copyright author (defaults to git config user.name)"
required = false

[[inputs]]
key = "dynamic_fetch"
type = "bool"
prompt = "Fetch the latest license body from the GitHub Licenses API on demand? (requires network)"
default = false
required = false

[[steps]]
id = "write"
kind = "python"
