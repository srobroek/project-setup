schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "lang-go"
name = "Go language overlay"
version = "1.0.1"  # x-release-please-version
description = "Add Go tooling (go mod, golangci-lint) to a scaffolded project. Appends Go .gitignore entries and pre-commit-golang hooks."
default_enabled = false
reconcile = true

[order]
after = ["gitignore-generate", "precommit-setup"]

# Identity input — the agent supplies the SAME project name it gave core-identity.
# project_name drives the package name embedded in cmd/main.go and the
# example.com/<name> fallback when no git remote is set.
[[inputs]]
key = "project_name"
type = "string"
prompt = "Project / package name (used for cmd/main.go and the module-path fallback)?"
default = ""
required = true

[[inputs]]
key = "module_path"
type = "string"
prompt = "Go module path (leave empty to derive from git remote)?"
default = ""
required = false

[[inputs]]
key = "app_kind"
type = "string"
prompt = "Application kind (optional, e.g. cli, service, library — leave empty for default)?"
default = ""
required = false

[[steps]]
id = "write"
kind = "python"

# G4 — external-generator-run confirm (spec 004). SOFT gate: go mod init reaches
# the filesystem and creates go.mod, but the user already opted into the overlay,
# so it proceeds by default; --no-external-generators flips it to skip.
# Ordered AFTER the deterministic `write` so a declined gate (gate-blocked) skips
# ONLY the trailing `scaffold` step — the layout files (cmd/main.go, .golangci.yml,
# .gitignore, pre-commit hooks) are already written.
[[steps]]
id = "run-generator"
kind = "gate"
hardness = "soft"
skip_flag = "no-external-generators"
message = "Run the external go mod init generator (creates go.mod). The deterministic layout files are already written — declining skips only the generator."

[[steps]]
id = "scaffold"
kind = "python"
