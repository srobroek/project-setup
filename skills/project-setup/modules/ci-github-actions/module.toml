schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "ci-github-actions"
name = "GitHub Actions CI workflow"
version = "1.1.0"  # x-release-please-version
description = "Generate a .github/workflows/ci.yml sized to the project's actual stack — one job per active language overlay, matrix trimmed to pinned runtime versions, action refs pinned to current majors."
default_enabled = false
reconcile = true

# Run after all language overlays and justfile-write so the agent can read
# their frozen answers (python_version, package_manager, use_just, etc.) when
# sizing the CI matrix. No 'requires' — the module works without lang-* overlays.
[order]
after = ["justfile-write", "lang-python", "lang-ts", "lang-go", "lang-rust"]

# ── User-visible inputs ────────────────────────────────────────────────────── #

[[inputs]]
key = "ci_trigger"
type = "multichoice"
prompt = "Which GitHub events should trigger the workflow?"
choices = ["push", "pull_request", "workflow_dispatch"]
default = ["push", "pull_request"]
required = false

[[inputs]]
key = "default_branch"
type = "string"
prompt = "Default branch name (used for push trigger filter)?"
default = "main"
required = false

# ── Steps ─────────────────────────────────────────────────────────────────── #

# Phase A: agent synthesizes the full CI plan from the resolved stack answers.
[[steps]]
id = "resolve"
kind = "agent"
steering = "steering/resolve.md"

# G6 — agent-decision review (spec 004). HARD gate: the agent researched the
# CI matrix + action majors (model judgment), so a human consents before the
# deterministic write turns them into a push-triggering, reproduced artifact.
# init_only: on plain reproduce the frozen decision is already consented, so
# the gate auto-proceeds without prompting; only --refresh re-arms it.
# CI must pass --allow-ci-write to perform the write at init.
[[steps]]
id = "ci-review"
kind = "gate"
hardness = "hard"
allow_flag = "allow-ci-write"
init_only = true
message = "GitHub Actions CI workflow (agent-synthesized, sized to your stack):\n{decision}\nWrite .github/workflows/ci.yml?"

# Phase B: validate commands, render canonical YAML, write idempotently.
[[steps]]
id = "write"
kind = "python"
