schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "git-init"
name = "Git initialisation"
version = "1.0.1"  # x-release-please-version
description = "Run git init in the project directory and clear macOS provenance xattr on .git/."
default_enabled = true
reconcile = false

[order]

[[inputs]]
key = "init_git"
type = "bool"
prompt = "Initialise a git repository in this directory?"
default = true
required = false

[[steps]]
id = "init"
kind = "python"
