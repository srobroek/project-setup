schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "git-init"
name = "Git initialisation"
version = "1.0.1"  # x-release-please-version
description = "Run git init in the project directory and clear macOS provenance xattr on .git/. Optionally commits the initial scaffold once all other modules have written their files."
default_enabled = true
reconcile = false

[order]
# Soft after-edges covering all bundled modules so the commit step runs
# AFTER every other module has written its files.  after= is soft: absent
# or disabled modules are silently dropped, so this never blocks the run.
after = [
    "agents-md",
    "apm-install",
    "ci-github-actions",
    "codex-config",
    "core-identity",
    "dirs-scaffold",
    "env-example",
    "github-repo",
    "gitignore-generate",
    "justfile-write",
    "lang-go",
    "lang-python",
    "lang-rust",
    "lang-ts",
    "license-write",
    "mcp-config",
    "org-policy",
    "package-add",
    "precommit-setup",
    "quality-hooks",
    "readme-draft",
    "speckit-bridge",
    "stack-adr",
]

[[inputs]]
key = "init_git"
type = "bool"
prompt = "Initialise a git repository in this directory?"
default = true
required = false

# When true, create an initial commit (git add -A && git commit) after all
# other modules have written their files.  Default false (opt-in) because a
# commit is a mutation; the agent/user enables it explicitly.  Non-fatal if
# git is unavailable or the commit fails — a warning is emitted and the run
# continues.
[[inputs]]
key = "initial_commit"
type = "bool"
prompt = "Create an initial commit once the scaffold is complete?"
default = false
required = false

[[steps]]
id = "init"
kind = "python"

[[steps]]
id = "commit"
kind = "python"
