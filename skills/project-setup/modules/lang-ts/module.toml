schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "lang-ts"
name = "TypeScript language overlay"
version = "1.1.0"  # x-release-please-version
description = "Add TypeScript tooling (bun/pnpm, tsconfig, biome, prettier) to a scaffolded project. Appends Node .gitignore entries and biome/prettier pre-commit hooks."
default_enabled = false
reconcile = true

[order]
after = ["gitignore-generate", "precommit-setup"]

[[inputs]]
key = "target"
type = "string"
prompt = "Project target / description (used for context, e.g. 'API server', 'web app')?"
default = ""
required = false

[[inputs]]
key = "package_manager"
type = "choice"
prompt = "Package manager?"
choices = ["bun", "pnpm"]
default = "bun"
required = false

[[inputs]]
key = "framework"
type = "string"
prompt = "Framework (nuxt, vite, plain — leave empty for plain)?"
default = "plain"
required = false

[[inputs]]
key = "ui_kit"
type = "string"
prompt = "UI kit (optional, e.g. shadcn, naive-ui — leave empty for none)?"
default = ""
required = false

# spec 013: agent-decided depth-resolver answers, declared so `when` predicates parse (004 OQ-2).
[[inputs]]
key = "test_runner"
type = "string"
default = ""
required = false

[[inputs]]
key = "template_id"
type = "string"
default = "none"
required = false

[[inputs]]
key = "ui_kit_id"
type = "string"
default = "none"
required = false

[[inputs]]
key = "ui_kit_init_command"
type = "string"
default = ""
required = false

[[inputs]]
key = "runtime"
type = "string"
default = "bun"
required = false

[[inputs]]
key = "node_line"
type = "string"
default = ""
required = false

# pinned_deps / dev_deps / package_manager_pin are normally produced by the
# `resolve` agent step and folded in via answers_to_persist (which runs AFTER
# answer resolution, so it overrides anything supplied here). They are also
# declared as optional inputs so a pre-resolving agent (or a scripted --answers
# run) can supply exact name@version pins directly without the live resolve
# step. Empty by default → no deps written.
[[inputs]]
key = "pinned_deps"
type = "list"
prompt = "Pinned runtime dependencies (name@version), if pre-resolved"
default = []
required = false

[[inputs]]
key = "dev_deps"
type = "list"
prompt = "Pinned dev dependencies (name@version), if pre-resolved"
default = []
required = false

[[inputs]]
key = "package_manager_pin"
type = "string"
prompt = "Pinned package manager version, if pre-resolved"
default = ""
required = false

[[steps]]
id = "resolve"
kind = "agent"
steering = "steering/resolve.md"

# G6 — agent-decision review (spec 004). HARD + init_only — see lang-python for the
# rationale (consent the agent's researched pins once at init; replay byte-identical
# on reproduce; --refresh re-arms; CI opts in via --allow-stack-write).
[[steps]]
id = "pins"
kind = "gate"
hardness = "hard"
allow_flag = "allow-stack-write"
init_only = true
message = "TypeScript stack decision (agent-resolved, registry-verified):\n{decision}\nWrite package.json with these EXACT pins?"

[[steps]]
id = "write"
kind = "python"

# G4 — external-generator-run confirm (spec 004). SOFT gate: the scaffolder reaches
# the network and may --force-overwrite files, but the user already opted into the
# overlay, so it proceeds by default; --no-external-generators flips it to skip.
# Ordered AFTER the deterministic `write` so a declined gate (gate-blocked) skips
# ONLY the trailing `scaffold` step — the pinned package.json + tsconfig already
# landed (FR-013, Subtlety 1). The `when` confines the gate to frameworks that run
# an external generator; plain/sst still need bun/pnpm init, so no when there.
[[steps]]
id = "run-generator"
kind = "gate"
hardness = "soft"
skip_flag = "no-external-generators"
message = "Run the external framework scaffolder (network; nuxi/create-vite/bun init may overwrite files in the project dir). The deterministic pinned package.json is already written — declining skips only the generator."

[[steps]]
id = "scaffold"
kind = "python"

# G7 — ui-kit-init gate (spec 013 FR-007, FR-011). HARD gate guards the
# non-idempotent network command `shadcn init` (or equivalent). init_only=true
# so a plain reproduce auto-proceeds (the consented decision replays byte-
# identically) but ui-kit-scaffold safe-skips on reproduce to avoid clobbering
# already-scaffolded files. The `when` drops the gate entirely when ui_kit_id is
# "none" (the declared default) so pure-TS projects never see the prompt.
# CI opts in via --allow-ui-kit-init.
[[steps]]
id = "ui-kit-init"
kind = "gate"
hardness = "hard"
allow_flag = "allow-ui-kit-init"
init_only = true
when = "ui_kit_id != none"
message = "UI-kit init command (agent-decided; non-idempotent, reaches network):\n{decision}\nRun the UI-kit init command?"

[[steps]]
id = "ui-kit-scaffold"
kind = "python"
