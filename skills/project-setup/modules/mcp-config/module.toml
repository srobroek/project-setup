schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "mcp-config"
name = "MCP server config"
version = "1.0.0"
description = "Writes MCP server entries from public refs or a selected marketplace into .mcp.json."
default_enabled = false
reconcile = false

[order]
after = ["dirs-scaffold"]

[[inputs]]
key = "mcp_servers"
type = "list"
default = []
required = false
prompt = "MCP servers to configure (e.g. context7, repomix, package-version, codebase-memory; blank = none)"

[[inputs]]
key = "marketplace"
type = "string"
default = ""
required = false
prompt = "Marketplace to source MCP servers from (leave blank to use public upstream refs)"

[[inputs]]
key = "mcp_versions"
type = "string"
default = ""
required = false
prompt = "Pin specific MCP server versions as 'name=version' (space-separated; blank = all latest)"

[[steps]]
id = "resolve"
kind = "agent"
steering = "steering/resolve.md"

[[steps]]
id = "mcp-gate"
kind = "gate"
hardness = "hard"
allow_flag = "allow-mcp-config"
init_only = true
message = "Configure MCP servers (each runs via npx/uvx; review before approving):\n{decision}\nWrite .mcp.json?"

[[steps]]
id = "write"
kind = "python"
