schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "justfile-write"
name = "Skeleton justfile"
version = "1.0.0"
description = "Write a skeleton justfile with default/test/lint/build/dev/clean targets. Skipped when use_just=false."
default_enabled = false
reconcile = false

[order]
# No requires — justfile is independent of core-identity.

[[inputs]]
key = "use_just"
type = "bool"
prompt = "Create a justfile?"
default = true
required = false

[[steps]]
id = "write"
kind = "python"
