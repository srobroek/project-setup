schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "justfile-write"
name = "Skeleton justfile"
version = "1.0.2"  # x-release-please-version
description = "Write a skeleton justfile with default/test/lint/build/dev/clean targets. Skipped when use_just=false."
default_enabled = false
reconcile = false

[order]
# No requires — justfile is independent of core-identity.

[[inputs]]
key = "use_just"
type = "bool"
prompt = "Create a justfile?"
default = true
required = false

# Language overlay id that is enabled for this project (e.g. "python", "ts",
# "go", "rust"). When supplied, justfile-write renders idiomatic recipe bodies
# instead of fail-loud stubs. Supply the same value used to enable the lang-*
# module. Empty string (the default) keeps the fail-loud stubs so CI is never
# silently green for unconfigured commands.
[[inputs]]
key = "language"
type = "string"
prompt = "Language for justfile recipes (python / ts / go / rust / empty = stubs)"
default = ""
required = false

[[steps]]
id = "write"
kind = "python"
