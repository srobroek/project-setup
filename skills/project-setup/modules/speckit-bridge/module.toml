schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "speckit-bridge"
name = "Speckit bridge"
version = "1.0.0"  # x-release-please-version
description = "Install and initialise speckit when spec_mode is lightweight or full."
default_enabled = false
reconcile = false

[order]
after = ["apm-install"]

[[inputs]]
key = "spec_mode"
type = "choice"
prompt = "Spec / speckit mode"
choices = ["none", "lightweight", "full"]
default = "none"
required = false

[[inputs]]
key = "marketplace"
type = "string"
prompt = "Marketplace name (blank = no marketplace selected)"
default = ""
required = false

[[inputs]]
key = "speckit_source"
type = "string"
prompt = "speckit package locator if your marketplace provides one (blank = use public github/spec-kit)"
default = ""
required = false

[[inputs]]
key = "speckit_version"
type = "string"
prompt = "spec-kit version to install (e.g. 'v0.0.61'), or 'latest' to always use the current release"
default = "latest"
required = false

[[steps]]
id = "setup"
kind = "python"
