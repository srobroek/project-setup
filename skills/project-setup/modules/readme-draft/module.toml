schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "readme-draft"
name = "README draft"
version = "1.0.0"  # x-release-please-version
description = "Draft a project README.md from frozen scaffold facts (project name, org, layout, language, framework, resolved stack, license). Agent drafts; gate shows the draft; python step writes write-once. Never clobbers a hand-edited README."
default_enabled = false
reconcile = false

[order]
after = ["core-identity", "lang-python", "lang-ts", "lang-go", "lang-rust"]

[[steps]]
id = "draft"
kind = "agent"
steering = "steering/draft.md"

[[steps]]
id = "readme-gate"
kind = "gate"
hardness = "hard"
allow_flag = "allow-readme"
init_only = true
message = "Project README draft (agent-authored):\n{decision}\nWrite README.md?"

[[steps]]
id = "write"
kind = "python"
