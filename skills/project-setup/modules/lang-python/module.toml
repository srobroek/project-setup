schema_version = "1.0"

[meta]
repository = "github.com/your-org/your-repo"
author = "Sjors Robroek"

[module]
id = "lang-python"
name = "Python language overlay"
version = "1.0.0"
description = "Add Python tooling (uv, ruff, pytest) to a scaffolded project. Appends Python .gitignore entries and ruff pre-commit hooks."
default_enabled = false
reconcile = true

[order]
after = ["gitignore-generate", "precommit-setup"]

[[inputs]]
key = "python_version"
type = "string"
prompt = "Python version to target?"
default = "3.13"
required = false

[[inputs]]
key = "framework"
type = "string"
prompt = "Framework (optional, e.g. fastapi, django, flask — leave empty for none)?"
default = ""
required = false

[[steps]]
id = "resolve"
kind = "agent"
steering = "steering/resolve.md"

# G6 — agent-decision review (spec 004). HARD gate: the agent researched + picked
# these pins (model judgment, not determinism), so a human consents before the
# deterministic write turns them into a frozen, replayed supply-chain artifact.
# init_only: on plain reproduce the frozen decision is already consented, so the
# gate auto-proceeds (no prompt, write replays byte-identical); only --refresh
# re-arms it. CI must pass --allow-stack-write to perform the write at init.
[[steps]]
id = "pins"
kind = "gate"
hardness = "hard"
allow_flag = "allow-stack-write"
init_only = true
message = "Python stack decision (agent-resolved, registry-verified):\n{decision}\nWrite pyproject.toml + dev tooling with these EXACT pins?"

[[steps]]
id = "write"
kind = "python"
